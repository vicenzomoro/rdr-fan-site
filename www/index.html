<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <title>RDR Fan Site</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(204,0,0,0.2);
      border-top-color: #cc0000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #a0a0a0; font-size: 14px; }
  </style>
</head>
<body>
  <div class="loader" id="loader"></div>
  <p id="msg">Abrindo o acampamento...</p>
  <script>
    // Substitua pela URL do seu site no Netlify (ex: https://seu-site.netlify.app)
    var SITE_URL = 'https://rdr-fan-site.netlify.app';
    window.location.replace(SITE_URL);
  </script>
</body>
</html>
